<div class="admin-shell">
  <!-- Topbar (só aparece no mobile) -->
  <header class="admin-topbar">
    <button type="button" class="tb-menu" (click)="alternarMenu()" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16" /></svg>
    </button>
    <span class="tb-brand">Painel Dolen</span>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" [class.aberta]="menuAberto()" [class.colapsada]="colapsada()">
    <div class="sb-brand">
      <img src="/assets/images/dolen-icone-preto.png" alt="Dolen" width="26" height="26" class="sb-logo" />
      <div class="sb-brand-txt">
        <strong>Dolen</strong>
        <span>Painel</span>
      </div>
    </div>

    <button type="button" class="sb-colapsar" (click)="alternarColapso()" [attr.aria-label]="colapsada() ? 'Expandir menu' : 'Recolher menu'" [title]="colapsada() ? 'Expandir menu' : 'Recolher menu'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <nav class="sb-nav">
      <div class="sb-group">
        <span class="sb-glabel">Geral</span>
        <a routerLink="/admin/dashboard" routerLinkActive="ativo" (click)="fecharMenu()" title="Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
          <span class="sb-label">Dashboard</span>
        </a>
        <a routerLink="/admin/leads" routerLinkActive="ativo" (click)="fecharMenu()" title="Leads">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="sb-label">Leads</span>
        </a>
      </div>

      <div class="sb-group">
        <span class="sb-glabel">Site</span>
        <a routerLink="/admin/conteudo" routerLinkActive="ativo" (click)="fecharMenu()" title="Conteúdo do site">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          <span class="sb-label">Conteúdo do site</span>
        </a>
        <a routerLink="/admin/precos" routerLinkActive="ativo" (click)="fecharMenu()" title="Preços">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41 12 22l-8.59-8.59A2 2 0 0 1 3 12V4a1 1 0 0 1 1-1h8a2 2 0 0 1 1.41.59L22 12a2 2 0 0 1-1.41 1.41Z"/><circle cx="7.5" cy="7.5" r="1.3" fill="currentColor" stroke="none"/></svg>
          <span class="sb-label">Preços</span>
        </a>
        <a routerLink="/admin/secoes" routerLinkActive="ativo" (click)="fecharMenu()" title="Seções do site">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span class="sb-label">Seções do site</span>
        </a>
        <a routerLink="/admin/propostas" routerLinkActive="ativo" (click)="fecharMenu()" title="Propostas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
          <span class="sb-label">Propostas</span>
        </a>
      </div>

      <div class="sb-group">
        <span class="sb-glabel">Redes &amp; vendas</span>
        <a routerLink="/admin/publicacoes" routerLinkActive="ativo" (click)="fecharMenu()" title="Publicações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.6" cy="6.4" r="1" fill="currentColor" stroke="none"/></svg>
          <span class="sb-label">Publicações</span>
        </a>
        <span class="sb-soon" title="WhatsApp (em breve)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          <span class="sb-label">WhatsApp</span>
          <em class="sb-label">em breve</em>
        </span>
      </div>
    </nav>

    <div class="sb-foot">
      <div class="sb-user" title="{{ usuario()?.name }}">
        <span class="sb-avatar">{{ iniciais(usuario()?.name) }}</span>
        <div class="sb-user-txt sb-label">
          <strong>{{ usuario()?.name ?? 'Administrador' }}</strong>
          <span>{{ usuario()?.email }}</span>
        </div>
      </div>
      <button type="button" class="sb-sair" (click)="sair()" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
        <span class="sb-label">Sair</span>
      </button>
    </div>
  </aside>

  @if (menuAberto()) {
    <div class="sb-backdrop" (click)="fecharMenu()"></div>
  }

  <!-- Conteúdo -->
  <main class="admin-main">
    <router-outlet />
  </main>
</div>
