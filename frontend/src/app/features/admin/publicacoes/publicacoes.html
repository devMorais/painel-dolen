<header class="pg-head">
  <div>
    <h1>Publicações</h1>
    <p>Componha e publique no Instagram — foto, carrossel, story ou reels — agora ou agendado, sem sair do painel.</p>
  </div>
</header>

<app-tabs [abas]="abas()" [(ativa)]="aba" />

<div class="pg-corpo">
  @switch (aba()) {
    @case ('compor') {
      <app-publicacoes-compor (publicada)="aoPublicar($event)" />
    }
    @case ('metricas') {
      <app-publicacoes-metricas />
    }
    @case ('agendados') {
      <app-publicacoes-agendados
        [itens]="agendadas()"
        [carregando]="carregando()"
        (publicarAgora)="aoAtualizar($event)"
        (excluir)="aoExcluir($event)"
      />
    }
    @case ('publicados') {
      <app-publicacoes-publicados />
    }
  }
</div>
