<div class="login-page">
  <form class="login-card" [formGroup]="formulario" (ngSubmit)="enviar()">
    <h1>Painel Dolen</h1>
    <p class="subtitulo">Entre para gerenciar as seções do site.</p>

    <label>
      E-mail
      <input type="email" formControlName="email" autocomplete="username" />
    </label>

    <label>
      Senha
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (erro()) {
      <p class="erro">{{ erro() }}</p>
    }

    <button type="submit" class="btn btn-solid" [disabled]="enviando()">
      {{ enviando() ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>
</div>
