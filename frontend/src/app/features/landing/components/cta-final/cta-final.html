@if (conteudo(); as c) {
  <section class="cta-final" id="contato">
    <div class="wrap">
      <h2>{{ c.titulo }}</h2>
      <p>{{ c.texto }}</p>

      <div class="cta-acoes">
        <a routerLink="/orcamento" class="btn btn-cta-solid btn-enviar">Pedir orçamento grátis</a>

        @if (configuracoes()?.whatsapp_numero; as whatsapp) {
          <a [href]="linkWhatsApp(whatsapp)" target="_blank" rel="noopener" class="btn btn-ghost-dark">
            Chamar no WhatsApp
          </a>
        }
      </div>

      <div class="contact-row">
        <a [href]="c.instagram_url" target="_blank" rel="noopener" class="cta-inline-link">
          {{ c.instagram_label }}
        </a>
      </div>
      <small>{{ c.nota }}</small>
    </div>
  </section>
}
